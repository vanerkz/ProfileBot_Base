
DWAPlannerROS:
  # Robot velocities
  max_vel_x: 0.225
  min_vel_x: -0.05
  max_vel_y: 0.0
  min_vel_y: 0.0
  max_vel_trans: 0.225
  min_vel_trans: 0.1
  max_vel_theta: 0.65
  min_vel_theta: 0.1
  acc_lim_x: 2.0
  acc_lim_y: 0.0
  acc_lim_theta: 2.0

  # Goal tolerances
  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.1
  latch_xy_goal_tolerance: false

  # Forward simulation
  sim_time: 2
  vx_samples: 15
  vy_samples: 0
  vth_samples: 40
  controller_frequency: 5.0
  planner_frequency: 1.0
  transform_tolerance: 0.3

  # Trajectory scoring
  path_distance_bias: 75
  goal_distance_bias: 20.0
  occdist_scale: 0.25
  forward_point_distance: 0.325
  stop_time_buffer: 0.2
  scaling_speed: 0.15
  max_scaling_factor: 1.0

  # Oscillation prevention
  oscillation_reset_dist: 0.05

  # Debugging
  publish_traj_pc: true
  publish_cost_grid_pc: true
