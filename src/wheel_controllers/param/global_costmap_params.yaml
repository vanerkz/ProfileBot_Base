global_costmap:
  global_frame: map
  robot_base_frame: base_link
  update_frequency: 1.0
  publish_frequency: 0.5
  rolling_window: false
  static_map: true          
  width: 20.0
  height: 20.0
  resolution: 0.05
  transform_tolerance: 0.3

  observation_sources: scan
  scan:
    sensor_frame: laser
    data_type: LaserScan
    topic: /scan
    marking: true
    clearing: true
    expected_update_rate: 10.0
    observation_persistence: 0.0