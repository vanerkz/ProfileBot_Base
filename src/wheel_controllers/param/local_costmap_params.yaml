local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 5.0
  publish_frequency: 2.0
  rolling_window: true
  width: 6.0
  height: 6.0
  resolution: 0.05
  transform_tolerance: 0.3
  inflation_radius: 1.0       # Obstacle inflation
  cost_scaling_factor: 1.0    # How fast cost decreases away from obstacles
  observation_sources: scan
  scan:
    sensor_frame: laser
    data_type: LaserScan
    topic: /scan
    marking: true
    clearing: true
    expected_update_rate: 10.0
    observation_persistence: 0.0
